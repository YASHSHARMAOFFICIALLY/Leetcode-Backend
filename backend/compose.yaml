services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: leetcode
      POSTGRES_PASSWORD: leetcode
      POSTGRES_DB: leetcode
    ports:
      - "5433:5432" # host:container — 5433 avoids the native Postgres on 5432
    volumes:
      - pgdata:/var/lib/postgresql/data # persists data across restarts
    healthcheck: # so `depends_on: condition: service_healthy` works later
      test: ["CMD-SHELL", "pg_isready -U leetcode -d leetcode"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
